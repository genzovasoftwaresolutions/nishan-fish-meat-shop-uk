[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# All API routes run on Netlify Functions (no external server needed)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/dashboard"
  to = "/admin/dashboard.html"
  status = 200

[[redirects]]
  from = "/admin/login"
  to = "/admin/login.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/login.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/fish.html"
  status = 200

[[redirects]]
  from = "/fish"
  to = "/fish.html"
  status = 200

[[redirects]]
  from = "/meat"
  to = "/meat.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/account"
  to = "/account.html"
  status = 200
