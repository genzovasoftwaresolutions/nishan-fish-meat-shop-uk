[build]
  publish = "."

# Live API + uploaded images (Render Node server)
[[redirects]]
  from = "/api/*"
  to = "https://nishan-fish-meat-shop-uk.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/nottinghill_export/*"
  to = "https://nishan-fish-meat-shop-uk.onrender.com/nottinghill_export/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/dashboard"
  to = "/admin/dashboard.html"
  status = 200

[[redirects]]
  from = "/admin/login"
  to = "/account.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/account.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/fish.html"
  status = 200

[[redirects]]
  from = "/fish"
  to = "/fish.html"
  status = 200

[[redirects]]
  from = "/meat"
  to = "/meat.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/account"
  to = "/account.html"
  status = 200
